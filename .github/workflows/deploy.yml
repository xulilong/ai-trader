name: 🚀 Auto Deploy

on:
  push:
    branches: [ main, master ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 📦 Install dependencies
        run: |
          cd investment-simulator
          npm install --legacy-peer-deps || npm install || echo "No deps needed"
          
      - name: 📊 Generate sample data
        run: |
          cd investment-simulator
          node sample-data.js
          
      - name: 🎯 Run trading simulation
        run: |
          cd investment-simulator
          node sim-trader.js
          
      - name: 🏗️ Build
        run: |
          cd investment-simulator
          echo "Build completed"
          
      - name: 📁 Setup Pages artifact
        run: |
          mkdir -p _site
          cp -r investment-simulator/web/* _site/
          cp investment-simulator/state.json _site/state.json
          ls -la _site/
          
      - name: 📦 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'
          
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
      - name: ✅ Deployment complete
        run: |
          echo "🎉 Deployment successful!"
          echo "🌐 Visit: ${{ steps.deployment.outputs.page_url }}"
