<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦞 实时交易监控 - 龙哥的操盘手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    
    header {
      text-align: center;
      padding: 30px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 30px;
    }
    header h1 {
      font-size: 2.5em;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      background: rgba(0,217,255,0.1);
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .status-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .live-indicator {
      width: 12px;
      height: 12px;
      background: #00ff88;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 25px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .stat-value {
      font-size: 2.5em;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .stat-value.positive { color: #00ff88; }
    .stat-value.negative { color: #ff4757; }
    .stat-label {
      color: #888;
      font-size: 0.9em;
      text-transform: uppercase;
    }
    
    .section {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 30px;
    }
    .section h2 {
      font-size: 1.5em;
      margin-bottom: 20px;
      color: #00d9ff;
    }
    
    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    th {
      background: rgba(0,217,255,0.1);
      color: #00d9ff;
      font-size: 0.85em;
      text-transform: uppercase;
    }
    tr:hover { background: rgba(255,255,255,0.05); }
    
    .badge {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: 600;
    }
    .badge-buy { background: rgba(0,255,136,0.2); color: #00ff88; }
    .badge-sell { background: rgba(255,71,87,0.2); color: #ff4757; }
    
    .pnl-up { color: #00ff88; }
    .pnl-down { color: #ff4757; }
    
    .refresh-info {
      text-align: center;
      color: #666;
      font-size: 0.9em;
      margin-top: 20px;
    }
    
    .chart-container { height: 300px; position: relative; }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🦞 实时交易监控</h1>
      <p>龙哥的 AI 操盘手 - 翻倍挑战进行时</p>
    </header>
    
    <div class="status-bar">
      <div class="status-item">
        <div class="live-indicator"></div>
        <span>🔴 实时连接</span>
      </div>
      <div class="status-item">
        <span id="lastUpdate">最后更新：-</span>
      </div>
      <div class="status-item">
        <span id="nextUpdate">下次更新：30s</span>
      </div>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="totalAssets">-</div>
        <div class="stat-label">总资产</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalReturn">-</div>
        <div class="stat-label">总收益率</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="dailyReturn">-</div>
        <div class="stat-label">今日收益</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="positionCount">-</div>
        <div class="stat-label">持仓数量</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="winRate">-</div>
        <div class="stat-label">胜率</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalTrades">-</div>
        <div class="stat-label">交易次数</div>
      </div>
    </div>
    
    <div class="section">
      <h2>💼 当前持仓</h2>
      <table>
        <thead>
          <tr>
            <th>股票代码</th>
            <th>持仓数量</th>
            <th>成本价</th>
            <th>当前价</th>
            <th>市值</th>
            <th>盈亏</th>
            <th>盈亏率</th>
          </tr>
        </thead>
        <tbody id="positionsBody">
          <tr><td colspan="7" class="empty-state">加载中...</td></tr>
        </tbody>
      </table>
    </div>
    
    <div class="section">
      <h2>📝 交易记录</h2>
      <table>
        <thead>
          <tr>
            <th>时间</th>
            <th>类型</th>
            <th>股票代码</th>
            <th>价格</th>
            <th>数量</th>
            <th>金额</th>
            <th>盈亏</th>
          </tr>
        </thead>
        <tbody id="tradesBody">
          <tr><td colspan="7" class="empty-state">加载中...</td></tr>
        </tbody>
      </table>
    </div>
    
    <div class="section">
      <h2>📈 资金曲线</h2>
      <div class="chart-container">
        <canvas id="assetChart"></canvas>
      </div>
    </div>
    
    <div class="refresh-info">
      数据每 30 秒自动刷新 | 最后一次刷新：<span id="lastRefreshTime">-</span>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const API_BASE = ''; // 同域名
    let assetChart = null;
    let countdown = 30;
    
    function formatMoney(amount) {
      return '¥' + parseFloat(amount).toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
    }
    
    function formatPercent(value) {
      const num = parseFloat(value);
      const sign = num >= 0 ? '+' : '';
      return sign + num.toFixed(2) + '%';
    }
    
    function formatTime(isoString) {
      const date = new Date(isoString);
      return date.toLocaleString('zh-CN', {
        month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }
    
    async function loadData() {
      try {
        const response = await fetch('state.json?t=' + Date.now());
        const data = await response.json();
        
        updateStats(data);
        updatePositions(data.positions);
        updateTrades(data.tradeHistory);
        updateChart(data.dailySnapshot);
        updateLastUpdate(data.lastUpdate);
        
        document.getElementById('lastRefreshTime').textContent = formatTime(new Date().toISOString());
        countdown = 30;
      } catch (err) {
        console.error('加载数据失败:', err);
      }
    }
    
    function updateStats(data) {
      const totalAssets = data.capital + Object.values(data.positions).reduce((sum, pos) => {
        return sum + pos.shares * pos.currentPrice;
      }, 0);
      
      document.getElementById('totalAssets').textContent = formatMoney(totalAssets);
      
      const totalReturn = ((totalAssets - data.initialCapital) / data.initialCapital * 100);
      const totalReturnEl = document.getElementById('totalReturn');
      totalReturnEl.textContent = formatPercent(totalReturn);
      totalReturnEl.className = 'stat-value ' + (totalReturn >= 0 ? 'positive' : 'negative');
      
      document.getElementById('positionCount').textContent = Object.keys(data.positions).length;
      document.getElementById('totalTrades').textContent = data.tradeHistory.filter(t => t.type === 'SELL').length;
      
      const sellTrades = data.tradeHistory.filter(t => t.type === 'SELL');
      const winRate = sellTrades.length > 0 
        ? (sellTrades.filter(t => t.pnl > 0).length / sellTrades.length * 100).toFixed(2)
        : 0;
      document.getElementById('winRate').textContent = winRate + '%';
      
      if (data.dailySnapshot.length > 0) {
        const last = data.dailySnapshot[data.dailySnapshot.length - 1];
        const dailyReturnEl = document.getElementById('dailyReturn');
        dailyReturnEl.textContent = formatPercent(last.dailyReturn * 100);
        dailyReturnEl.className = 'stat-value ' + (last.dailyReturn >= 0 ? 'positive' : 'negative');
      }
    }
    
    function updatePositions(positions) {
      const tbody = document.getElementById('positionsBody');
      const positionArray = Array.isArray(positions) ? positions : Object.entries(positions).map(([code, pos]) => ({ code, ...pos }));
      
      if (positionArray.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">暂无持仓</td></tr>';
        return;
      }
      
      tbody.innerHTML = positionArray.map(pos => {
        const pnl = (pos.currentPrice - pos.avgCost) * pos.shares;
        const pnlPercent = ((pos.currentPrice - pos.avgCost) / pos.avgCost) * 100;
        const pnlClass = pnl >= 0 ? 'pnl-up' : 'pnl-down';
        return `
          <tr>
            <td><strong>${pos.code}</strong></td>
            <td>${pos.shares}</td>
            <td>¥${pos.avgCost.toFixed(2)}</td>
            <td>¥${pos.currentPrice.toFixed(2)}</td>
            <td>${formatMoney(pos.shares * pos.currentPrice)}</td>
            <td class="${pnlClass}">${formatMoney(pnl)}</td>
            <td class="${pnlClass}">${formatPercent(pnlPercent)}</td>
          </tr>
        `;
      }).join('');
    }
    
    function updateTrades(trades) {
      const tbody = document.getElementById('tradesBody');
      const recentTrades = Array.isArray(trades) ? trades.slice(-20).reverse() : [];
      
      if (recentTrades.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">暂无交易记录</td></tr>';
        return;
      }
      
      tbody.innerHTML = recentTrades.map(trade => {
        const typeClass = trade.type === 'BUY' ? 'badge-buy' : 'badge-sell';
        const pnlText = trade.type === 'SELL' && trade.pnl !== undefined
          ? (trade.pnl >= 0 ? `+${formatMoney(trade.pnl)}` : formatMoney(trade.pnl))
          : '-';
        const pnlClass = trade.type === 'SELL' && trade.pnl >= 0 ? 'pnl-up' : (trade.pnl < 0 ? 'pnl-down' : '');
        
        return `
          <tr>
            <td>${formatTime(trade.timestamp)}</td>
            <td><span class="badge ${typeClass}">${trade.type === 'BUY' ? '买入' : '卖出'}</span></td>
            <td><strong>${trade.stockCode}</strong></td>
            <td>¥${trade.price.toFixed(2)}</td>
            <td>${trade.shares}</td>
            <td>${formatMoney(trade.amount)}</td>
            <td class="${pnlClass}">${pnlText}</td>
          </tr>
        `;
      }).join('');
    }
    
    function updateChart(snapshots) {
      const ctx = document.getElementById('assetChart').getContext('2d');
      
      if (!snapshots || snapshots.length === 0) {
        return;
      }
      
      const labels = snapshots.map(s => s.date);
      const assets = snapshots.map(s => s.totalAssets);
      
      if (assetChart) {
        assetChart.destroy();
      }
      
      assetChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: '总资产 (¥)',
            data: assets,
            borderColor: '#00d9ff',
            backgroundColor: 'rgba(0, 217, 255, 0.1)',
            borderWidth: 3,
            fill: true,
            tension: 0.4,
            pointRadius: 4,
            pointBackgroundColor: '#00d9ff',
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            x: {
              grid: { color: 'rgba(255,255,255,0.05)' },
              ticks: { color: '#888' }
            },
            y: {
              grid: { color: 'rgba(255,255,255,0.05)' },
              ticks: {
                color: '#888',
                callback: v => '¥' + v.toFixed(0)
              }
            }
          }
        }
      });
    }
    
    function updateLastUpdate(isoString) {
      document.getElementById('lastUpdate').textContent = '最后更新：' + formatTime(isoString);
    }
    
    // 倒计时
    setInterval(() => {
      countdown--;
      if (countdown < 0) countdown = 30;
      document.getElementById('nextUpdate').textContent = `下次更新：${countdown}s`;
    }, 1000);
    
    // 初始加载
    document.addEventListener('DOMContentLoaded', loadData);
    
    // 每 30 秒自动刷新
    setInterval(loadData, 30000);
  </script>
</body>
</html>
