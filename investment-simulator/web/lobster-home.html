<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦞 龙虾小窝 - AI 操盘手的家</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #eee;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    header {
      text-align: center;
      padding: 30px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 30px;
    }
    
    header h1 {
      font-size: 2.5em;
      background: linear-gradient(90deg, #ff6b6b, #ffa502);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    
    .status-bar {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 15px 25px;
      background: rgba(255,107,107,0.1);
      border-radius: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    
    .status-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1em;
    }
    
    .live-indicator {
      width: 12px;
      height: 12px;
      background: #00ff88;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }
    
    /* 场景容器 */
    .scene-container {
      position: relative;
      width: 100%;
      height: 500px;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    /* 办公室场景 */
    .office-scene {
      background: linear-gradient(180deg, #2c3e50 0%, #34495e 50%, #2c3e50 100%);
      height: 100%;
      position: relative;
      display: none;
    }
    
    .office-scene.active {
      display: block;
    }
    
    /* 家庭场景 */
    .home-scene {
      background: linear-gradient(180deg, #8e44ad 0%, #9b59b6 50%, #8e44ad 100%);
      height: 100%;
      position: relative;
      display: none;
    }
    
    .home-scene.active {
      display: block;
    }
    
    /* 闲逛场景 */
    .outdoor-scene {
      background: linear-gradient(180deg, #27ae60 0%, #2ecc71 50%, #27ae60 100%);
      height: 100%;
      position: relative;
      display: none;
    }
    
    .outdoor-scene.active {
      display: block;
    }
    
    /* 龙虾角色 */
    .lobster-character {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 150px;
      animation: bounce 2s ease-in-out infinite;
      z-index: 10;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-20px); }
    }
    
    /* 办公桌 */
    .desk {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 120px;
      background: linear-gradient(180deg, #8b4513 0%, #654321 100%);
      border-radius: 10px 10px 0 0;
      z-index: 5;
    }
    
    .desk::before {
      content: '💻 📊 📈';
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 40px;
      white-space: nowrap;
    }
    
    /* 床 */
    .bed {
      position: absolute;
      bottom: 50px;
      right: 100px;
      width: 200px;
      height: 80px;
      background: linear-gradient(180deg, #ff6b6b 0%, #ee5a6f 100%);
      border-radius: 20px 20px 5px 5px;
      z-index: 5;
    }
    
    .bed::before {
      content: '🛏️';
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 50px;
    }
    
    /* 窗户 */
    .window {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 150px;
      background: linear-gradient(180deg, #87ceeb 0%, #b0e0e6 100%);
      border: 8px solid #654321;
      border-radius: 10px;
    }
    
    /* 活动面板 */
    .activity-panel {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      margin-top: 30px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .activity-panel h2 {
      font-size: 1.8em;
      margin-bottom: 20px;
      color: #ffa502;
      text-align: center;
    }
    
    .activity-list {
      list-style: none;
    }
    
    .activity-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      margin-bottom: 10px;
      transition: transform 0.3s, background 0.3s;
    }
    
    .activity-item:hover {
      transform: translateX(10px);
      background: rgba(255,255,255,0.1);
    }
    
    .activity-icon {
      font-size: 2.5em;
      width: 60px;
      text-align: center;
    }
    
    .activity-content {
      flex: 1;
    }
    
    .activity-title {
      font-size: 1.2em;
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .activity-time {
      font-size: 0.9em;
      color: #888;
    }
    
    .activity-status {
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: bold;
    }
    
    .status-working { background: rgba(0,255,136,0.2); color: #00ff88; }
    .status-resting { background: rgba(255,165,2,0.2); color: #ffa502; }
    .status-sleeping { background: rgba(138,43,226,0.2); color: #ba55d3; }
    
    /* 投资统计 */
    .trading-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    
    .stat-card {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 25px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .stat-value {
      font-size: 2.5em;
      font-weight: bold;
      margin-bottom: 10px;
    }
    
    .stat-value.positive { color: #00ff88; }
    .stat-value.negative { color: #ff4757; }
    
    .stat-label {
      color: #888;
      font-size: 0.9em;
      text-transform: uppercase;
    }
    
    /* 导航按钮 */
    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
      flex-wrap: wrap;
    }
    
    .nav-btn {
      padding: 15px 30px;
      border: none;
      border-radius: 25px;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      text-decoration: none;
      display: inline-block;
    }
    
    .nav-btn-primary {
      background: linear-gradient(90deg, #ff6b6b, #ffa502);
      color: white;
    }
    
    .nav-btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #eee;
    }
    
    .nav-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255,107,107,0.4);
    }
    
    /* 时间显示 */
    .clock {
      font-size: 3em;
      font-weight: bold;
      text-align: center;
      margin: 20px 0;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .work-schedule {
      text-align: center;
      color: #888;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🦞 龙虾小窝</h1>
      <p>AI 操盘手的温馨小家 & 办公室</p>
    </header>
    
    <div class="status-bar">
      <div class="status-item">
        <div class="live-indicator"></div>
        <span>🔴 在线</span>
      </div>
      <div class="status-item">
        <span id="currentScene">🏢 办公室</span>
      </div>
      <div class="status-item">
        <span id="currentActivity">📊 工作中</span>
      </div>
    </div>
    
    <div class="clock" id="clock">--:--:--</div>
    <div class="work-schedule">
      ⏰ 工作时间：周一至周五 08:30 - 18:00 | 双休日休息
    </div>
    
    <!-- 场景容器 -->
    <div class="scene-container">
      <!-- 办公室场景 -->
      <div class="office-scene active" id="officeScene">
        <div class="window"></div>
        <div class="lobster-character">🦞</div>
        <div class="desk"></div>
      </div>
      
      <!-- 家庭场景 -->
      <div class="home-scene" id="homeScene">
        <div class="window"></div>
        <div class="lobster-character">🦞</div>
        <div class="bed"></div>
      </div>
      
      <!-- 户外场景 -->
      <div class="outdoor-scene" id="outdoorScene">
        <div class="window" style="background: linear-gradient(180deg, #87ceeb 0%, #98fb98 100%);"></div>
        <div class="lobster-character">🦞</div>
      </div>
    </div>
    
    <!-- 活动面板 -->
    <div class="activity-panel">
      <h2>📋 龙虾今日行程</h2>
      <ul class="activity-list" id="activityList">
        <!-- 动态生成 -->
      </ul>
    </div>
    
    <!-- 投资统计 -->
    <div class="trading-stats" id="tradingStats">
      <div class="stat-card">
        <div class="stat-value" id="totalAssets">-</div>
        <div class="stat-label">总资产</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalReturn">-</div>
        <div class="stat-label">总收益</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="positionCount">-</div>
        <div class="stat-label">持仓数量</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="dayCount">-</div>
        <div class="stat-label">挑战天数</div>
      </div>
    </div>
    
    <!-- 导航按钮 -->
    <div class="nav-buttons">
      <a href="index.html" class="nav-btn nav-btn-secondary">📊 交易面板</a>
      <a href="realtime-dashboard.html" class="nav-btn nav-btn-secondary">🔴 实时监控</a>
      <a href="https://github.com/xulilong/ai-trader" class="nav-btn nav-btn-secondary" target="_blank">🐙 GitHub</a>
    </div>
  </div>
  
  <script>
    // 当前活动
    const activities = [
      { time: '08:30', icon: '🌅', title: '起床准备', status: 'completed' },
      { time: '09:00', icon: '📰', title: '查看财经新闻', status: 'completed' },
      { time: '09:30', icon: '📊', title: '分析股票数据', status: 'completed' },
      { time: '10:00', icon: '🦞', title: '执行交易决策', status: 'current' },
      { time: '12:00', icon: '🍜', title: '午餐时间', status: 'pending' },
      { time: '13:00', icon: '📈', title: '午后复盘', status: 'pending' },
      { time: '15:00', icon: '💼', title: '调仓换股', status: 'pending' },
      { time: '18:00', icon: '🏠', title: '下班回家', status: 'pending' },
    ];
    
    // 更新时钟
    function updateClock() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
      
      updateScene(now);
    }
    
    // 根据时间更新场景
    function updateScene(now) {
      const day = now.getDay(); // 0 = Sunday, 6 = Saturday
      const hour = now.getHours();
      const minute = now.getMinutes();
      const currentTime = hour * 60 + minute;
      
      const officeScene = document.getElementById('officeScene');
      const homeScene = document.getElementById('homeScene');
      const outdoorScene = document.getElementById('outdoorScene');
      const currentSceneEl = document.getElementById('currentScene');
      const currentActivityEl = document.getElementById('currentActivity');
      
      // 重置所有场景
      officeScene.classList.remove('active');
      homeScene.classList.remove('active');
      outdoorScene.classList.remove('active');
      
      // 周末
      if (day === 0 || day === 6) {
        // 周末可能在家或外出
        if (hour >= 23 || hour < 8) {
          homeScene.classList.add('active');
          currentSceneEl.textContent = '🏠 家';
          currentActivityEl.textContent = '😴 休息中';
        } else {
          outdoorScene.classList.add('active');
          currentSceneEl.textContent = '🌳 户外';
          currentActivityEl.textContent = '🎮 闲逛中';
        }
      } 
      // 工作日
      else {
        if (currentTime < 8 * 60 + 30) {
          // 上班前
          homeScene.classList.add('active');
          currentSceneEl.textContent = '🏠 家';
          currentActivityEl.textContent = '🌅 准备上班';
        } else if (currentTime >= 8 * 60 + 30 && currentTime < 18 * 60) {
          // 工作时间
          officeScene.classList.add('active');
          currentSceneEl.textContent = '🏢 办公室';
          currentActivityEl.textContent = '📊 工作中';
        } else {
          // 下班后
          homeScene.classList.add('active');
          currentSceneEl.textContent = '🏠 家';
          currentActivityEl.textContent = '🎮 休息中';
        }
      }
    }
    
    // 更新活动列表
    function updateActivityList() {
      const now = new Date();
      const currentTime = now.getHours() * 60 + now.getMinutes();
      
      const listEl = document.getElementById('activityList');
      listEl.innerHTML = activities.map((activity, index) => {
        const [hours, minutes] = activity.time.split(':').map(Number);
        const activityTime = hours * 60 + minutes;
        
        let statusClass = 'status-resting';
        let statusText = '待完成';
        
        if (activity.status === 'completed') {
          statusClass = 'status-working';
          statusText = '已完成';
        } else if (activity.status === 'current') {
          statusClass = 'status-working';
          statusText = '进行中';
        } else if (activity.status === 'pending') {
          statusClass = 'status-resting';
          statusText = '待完成';
        }
        
        return `
          <li class="activity-item">
            <div class="activity-icon">${activity.icon}</div>
            <div class="activity-content">
              <div class="activity-title">${activity.title}</div>
              <div class="activity-time">⏰ ${activity.time}</div>
            </div>
            <div class="activity-status ${statusClass}">${statusText}</div>
          </li>
        `;
      }).join('');
    }
    
    // 加载投资数据
    async function loadTradingStats() {
      try {
        const response = await fetch('state.json?t=' + Date.now());
        const data = await response.json();
        
        const totalAssets = data.capital + Object.values(data.positions).reduce((sum, pos) => {
          return sum + pos.shares * pos.currentPrice;
        }, 0);
        
        document.getElementById('totalAssets').textContent = '¥' + totalAssets.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        
        const totalReturn = ((totalAssets - data.initialCapital) / data.initialCapital * 100);
        const totalReturnEl = document.getElementById('totalReturn');
        totalReturnEl.textContent = (totalReturn >= 0 ? '+' : '') + totalReturn.toFixed(2) + '%';
        totalReturnEl.className = 'stat-value ' + (totalReturn >= 0 ? 'positive' : 'negative');
        
        document.getElementById('positionCount').textContent = Object.keys(data.positions).length;
        document.getElementById('dayCount').textContent = 'Day 1';
      } catch (err) {
        console.error('加载数据失败:', err);
      }
    }
    
    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      updateClock();
      updateActivityList();
      loadTradingStats();
      
      setInterval(updateClock, 1000);
      setInterval(loadTradingStats, 30000);
    });
  </script>
</body>
</html>
