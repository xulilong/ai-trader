<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📋 龙虾活动日志 - AI 操盘手每天都在做什么</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      padding: 30px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 30px;
    }
    
    header h1 {
      font-size: 2.5em;
      background: linear-gradient(90deg, #ff6b6b, #ffa502);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    
    .stat-item {
      text-align: center;
    }
    
    .stat-value {
      font-size: 2em;
      font-weight: bold;
      color: #ffa502;
    }
    
    .stat-label {
      color: #888;
      font-size: 0.9em;
    }
    
    .log-list {
      list-style: none;
    }
    
    .log-item {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 15px;
      border-left: 4px solid #ff6b6b;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    
    .log-item:hover {
      transform: translateX(10px);
      box-shadow: 0 5px 20px rgba(255,107,107,0.3);
    }
    
    .log-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 10px;
    }
    
    .log-icon {
      font-size: 2.5em;
    }
    
    .log-title {
      font-size: 1.3em;
      font-weight: bold;
      flex: 1;
    }
    
    .log-type {
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: bold;
    }
    
    .type-trading { background: rgba(0,255,136,0.2); color: #00ff88; }
    .type-analysis { background: rgba(0,217,255,0.2); color: #00d9ff; }
    .type-rest { background: rgba(255,165,2,0.2); color: #ffa502; }
    .type-learning { background: rgba(138,43,226,0.2); color: #ba55d3; }
    .type-other { background: rgba(255,255,255,0.2); color: #fff; }
    
    .log-time {
      color: #888;
      font-size: 0.9em;
      margin-bottom: 10px;
    }
    
    .log-details {
      color: #ccc;
      line-height: 1.6;
      padding: 15px;
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
    
    .refresh-info {
      text-align: center;
      color: #666;
      margin-top: 30px;
    }
    
    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 30px;
      flex-wrap: wrap;
    }
    
    .nav-btn {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      font-size: 1em;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      background: rgba(255,255,255,0.1);
      color: #eee;
      transition: transform 0.3s, background 0.3s;
    }
    
    .nav-btn:hover {
      transform: translateY(-3px);
      background: rgba(255,107,107,0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📋 龙虾活动日志</h1>
      <p>看看 AI 操盘手每天都在忙什么</p>
    </header>
    
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="totalLogs">-</div>
        <div class="stat-label">总活动数</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="todayLogs">-</div>
        <div class="stat-label">今日活动</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="tradingLogs">-</div>
        <div class="stat-label">交易操作</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="analysisLogs">-</div>
        <div class="stat-label">分析研究</div>
      </div>
    </div>
    
    <ul class="log-list" id="logList">
      <li class="empty-state">加载中...</li>
    </ul>
    
    <div class="refresh-info">
      数据每 30 秒自动刷新 | 最后更新：<span id="lastUpdate">-</span>
    </div>
    
    <div class="nav-buttons">
      <a href="lobster-home.html" class="nav-btn">🦞 龙虾之家</a>
      <a href="realtime-dashboard.html" class="nav-btn">📊 交易面板</a>
      <a href="index.html" class="nav-btn">🏠 返回首页</a>
    </div>
  </div>
  
  <script>
    function formatTime(isoString) {
      const date = new Date(isoString);
      return date.toLocaleString('zh-CN', {
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
    }
    
    function getTypeClass(type) {
      const classes = {
        'trading': 'type-trading',
        'analysis': 'type-analysis',
        'rest': 'type-rest',
        'learning': 'type-learning',
        'other': 'type-other',
      };
      return classes[type] || classes['other'];
    }
    
    async function loadLogs() {
      try {
        const response = await fetch('activity-log.json?t=' + Date.now());
        const logs = await response.json();
        
        updateStats(logs);
        updateLogList(logs);
        updateLastUpdate();
      } catch (err) {
        console.error('加载日志失败:', err);
        document.getElementById('logList').innerHTML = `
          <li class="empty-state">
            <div style="font-size: 3em; margin-bottom: 20px;">📭</div>
            <p>暂无活动记录</p>
            <p style="font-size: 0.9em; margin-top: 10px;">龙虾正在摸鱼中...</p>
          </li>
        `;
      }
    }
    
    function updateStats(logs) {
      const today = new Date().toISOString().split('T')[0];
      
      document.getElementById('totalLogs').textContent = logs.length;
      document.getElementById('todayLogs').textContent = logs.filter(l => l.timestamp.startsWith(today)).length;
      document.getElementById('tradingLogs').textContent = logs.filter(l => l.type === 'trading').length;
      document.getElementById('analysisLogs').textContent = logs.filter(l => l.type === 'analysis').length;
    }
    
    function updateLogList(logs) {
      const listEl = document.getElementById('logList');
      
      if (logs.length === 0) {
        listEl.innerHTML = '<li class="empty-state">暂无活动记录</li>';
        return;
      }
      
      listEl.innerHTML = logs.map(log => `
        <li class="log-item">
          <div class="log-header">
            <div class="log-icon">${log.icon}</div>
            <div class="log-title">${log.title}</div>
            <div class="log-type ${getTypeClass(log.type)}">${log.type}</div>
          </div>
          <div class="log-time">🕐 ${formatTime(log.timestamp)}</div>
          ${log.details ? `<div class="log-details">${log.details}</div>` : ''}
        </li>
      `).join('');
    }
    
    function updateLastUpdate() {
      document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN');
    }
    
    // 初始加载
    document.addEventListener('DOMContentLoaded', loadLogs);
    
    // 每 30 秒刷新
    setInterval(loadLogs, 30000);
  </script>
</body>
</html>
